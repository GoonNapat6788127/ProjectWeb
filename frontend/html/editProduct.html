<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonShop - Edit Product</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Judson&display=swap" rel="stylesheet">
</head>

<body>

<header class="top-header">
    <div class="logo">GoonShop</div>
</header>

<nav class="main-nav">
    <a href="/home">Home</a>
    <a href="/product" class="active">Product</a>
    <a href="/product-management">Admin</a>
</nav>

<main class="add-product-main">
    <div class="add-product-container">

        <!-- ✅ SAME AS ADD + enctype -->
        <form id="editForm" class="add-form-box" enctype="multipart/form-data">

            <!-- ================= IMAGE ================= -->
            <div class="image-col">

                <div class="img-placeholder">
                    <!-- Preview -->
                    <img id="previewImage" style="width:100%; display:none; border-radius:10px;" />

                    <!-- ✅ ADD FILE INPUT -->
                </div>
                <input 
        type="file" 
        id="imageInput" 
        name="image"
        accept="image/*"
    >

                <div class="action-btn-group">
                    <a href="/product-management" class="btn-form">Cancel</a>
                    <button type="submit" class="btn-form">Update</button>
                </div>

            </div>

            <!-- ================= FORM ================= -->
            <div class="form-col">

                <!-- ✅ KEEP PRODUCT ID -->
                <input id="productId" name="ProductID" type="text" class="form-input" readonly>

                <input id="productName" name="ProductName" type="text" class="form-input" placeholder="Product name" required>

                <input id="price" name="Price" type="number" class="form-input" placeholder="Price" required>

                <input id="brand" name="Brand" type="text" class="form-input" placeholder="Brand" required>

                <!-- ✅ ADD THESE -->
                <input id="mfgDate" name="MFGDate" type="date" class="form-input" required>

                <input id="expDate" name="EXPDate" type="date" class="form-input" required>

                <textarea id="ingredients" name="Ingredients" class="form-textarea" placeholder="Ingredients (comma separated)"></textarea>

            </div>

        </form>

    </div>
</main>

<script src="/script.js"></script>

<!-- ✅ IMAGE PREVIEW -->
<script>
document.getElementById("imageInput").addEventListener("change", function () {
    const file = this.files[0];
    const preview = document.getElementById("previewImage");

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});
</script>

</body>
</html>
