<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonShop - Edit Product</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Judson&display=swap" rel="stylesheet">
</head>

<body>

<header class="top-header">
        <div class="logo">GoonShop</div>

        <div class="search-container">
            <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="search-input" placeholder="Search">
        </div>

        <div class="header-icons">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                </path>
            </svg>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <a href="/admin" aria-label="Admin Login"
                style="color: inherit; text-decoration: none; display: flex; align-items: center;">
                <svg class="icon user-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z">
                    </path>
                </svg>
            </a>
        </div>
    </header>

<nav class="main-nav">
        <a href="/home">Home</a>
        <a href="/product">Product</a>
        <a href="#">Contact</a>
        <a href="/team">Team</a>
    </nav>

<main class="add-product-main">
    <div class="add-product-container">

        <!-- ✅ SAME AS ADD + enctype -->
        <form id="editForm" class="add-form-box" enctype="multipart/form-data">

            <!-- ================= IMAGE ================= -->
            <div class="image-col">

                <div class="img-placeholder">
                    <!-- Preview -->
                    <img id="previewImage" style="width:100%; display:none; border-radius:10px;" />

                    <!-- ✅ ADD FILE INPUT -->
                </div>
                <input 
        type="file" 
        id="imageInput" 
        name="image"
        accept="image/*"
    >

                <div class="action-btn-group">
                    <a href="/product-management" class="btn-form">Cancel</a>
                    <button type="submit" class="btn-form">Update</button>
                </div>

            </div>

            <!-- ================= FORM ================= -->
            <div class="form-col">

                <!-- ✅ KEEP PRODUCT ID -->
                <input id="productId" name="ProductID" type="text" class="form-input" readonly>

                <input id="productName" name="ProductName" type="text" class="form-input" placeholder="Product name" required>

                <input id="price" name="Price" type="number" class="form-input" placeholder="Price" required>

                <input id="brand" name="Brand" type="text" class="form-input" placeholder="Brand" required>

                <!-- ✅ ADD THESE -->
                <input id="mfgDate" name="MFGDate" type="date" class="form-input" required>

                <input id="expDate" name="EXPDate" type="date" class="form-input" required>

                <textarea id="ingredients" name="Ingredients" class="form-textarea" placeholder="Ingredients (comma separated)"></textarea>

            </div>

        </form>

    </div>
</main>

<script src="/script.js"></script>

<!-- ✅ IMAGE PREVIEW -->
<script>
document.getElementById("imageInput").addEventListener("change", function () {
    const file = this.files[0];
    const preview = document.getElementById("previewImage");

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});
</script>

</body>
</html>
