<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonShop - Add Product</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Judson&display=swap" rel="stylesheet">
</head>

<body>

<header class="top-header">
    <div class="logo">GoonShop</div>
</header>

<nav class="main-nav">
    <a href="/home">Home</a>
    <a href="/product" class="active">Product</a>
    <a href="/product-management">Admin</a>
</nav>

<main class="add-product-main">
    <div class="add-product-container">

        <!-- ✅ IMPORTANT: enctype added -->
        <form id="addForm" class="add-form-box" enctype="multipart/form-data">

            <!-- ================= IMAGE ================= -->
            <div class="image-col">

                <div class="img-placeholder">
                    <!-- Preview -->
                    <img id="previewImage" style="width:100%; display:none; border-radius:10px;" />

                </div>
                <!-- File input -->
                <input 
                    type="file" 
                    id="imageInput" 
                    name="image"
                    accept="image/*"
                >

                <div class="action-btn-group">
                    <a href="/product-management" class="btn-form">Cancel</a>
                    <button type="submit" class="btn-form">Add</button>
                </div>

            </div>

            <!-- ================= FORM ================= -->
            <div class="form-col">

                <input name="ProductName" id="productName" type="text" class="form-input" placeholder="Product name" required>

                <input name="Price" id="price" type="number" class="form-input" placeholder="Price" required>

                <input name="Brand" id="brand" type="text" class="form-input" placeholder="Brand" required>

                <!-- ✅ ADD THESE (required by backend) -->
                <input name="MFGDate" id="mfgDate" type="date" class="form-input" required>

                <input name="EXPDate" id="expDate" type="date" class="form-input" required>

                <!-- optional -->
                <textarea name="Ingredients" id="ingredients" class="form-textarea" placeholder="Ingredients (comma separated)"></textarea>

            </div>

        </form>

    </div>
</main>

<!-- ✅ JS -->
<script src="/script.js"></script>

<!-- ✅ IMAGE PREVIEW (small UX upgrade) -->
<script>
document.getElementById("imageInput").addEventListener("change", function () {
    const file = this.files[0];
    const preview = document.getElementById("previewImage");

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});
</script>

</body>
</html>
