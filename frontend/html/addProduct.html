<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonShop - Add Product</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Judson:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <header class="top-header">
        <div class="logo">GoonShop</div>
        </header>

    <nav class="main-nav">
        <a href="/home">Home</a>
        <a href="/product" class="active">Product</a>
        <a href="#">Contact</a>
        <a href="/Team">Team</a>
    </nav>

    <main class="add-product-main">
        <div class="add-product-container">
            <div class="add-form-box">
                
                <div class="image-col">
                    <div class="img-placeholder">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                    
                    <div class="action-btn-group">
                        <a href="/product-management" class="btn-form" style="text-decoration: none; text-align: center;">Cancel</a>
                        <button type="submit" class="btn-form">Add</button>
                    </div>
                </div>

                <div class="form-col">
                    <input type="text" class="form-input" placeholder="Product name">
                    <input type="text" class="form-input" placeholder="Price">
                    <input type="text" class="form-input" placeholder="Brand">
                    <textarea class="form-textarea" placeholder="Ingredients"></textarea>
                </div>

            </div>

        </div>
    </main>

</body>
</html>
